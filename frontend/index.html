<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurodapt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/styles/auth.css">
</head>

<body class="bg-[#050505]">
    <div id="root"></div>

    <script type="module">
        import React from "https://esm.sh/react@18.2.0?target=es2019";
        import { createRoot } from "https://esm.sh/react-dom@18.2.0/client?target=es2019&deps=react@18.2.0";
        import { App } from "./src/App.js";

        const rootElement = document.getElementById("root");

        if (rootElement) {
            createRoot(rootElement).render(React.createElement(App));
        }
    </script>
</body>

</html>
