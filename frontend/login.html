<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Neurodapt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./src/styles/auth.css">
</head>

<body class="relative flex min-h-screen items-center justify-center selection:bg-purple-500/30">
    <!-- Background Elements -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <div
            class="absolute top-[-20%] left-[-10%] w-[70vh] h-[70vh] rounded-full bg-purple-900/40 blur-[130px] animate-blob">
        </div>
        <div
            class="absolute top-[20%] right-[-20%] w-[60vh] h-[60vh] rounded-full bg-blue-900/40 blur-[130px] animate-blob animation-delay-2000">
        </div>
        <div
            class="absolute bottom-[-20%] left-[10%] w-[80vh] h-[80vh] rounded-full bg-indigo-900/30 blur-[130px] animate-blob animation-delay-4000">
        </div>
        <div
            class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMjAwIDIwMCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48ZmlsdGVyIGlkPSJub2lzZSI+PGZlVHVyYnVsZW5jZSB0eXBlPSJmcmFjdGFsTm9pc2UiIGJhc2VGcmVxdWVuY3k9IjAuNjUiIG51bU9jdGF2ZXM9IjMiIHN0aXRjaFRpbGVzPSJzdGl0Y2giLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgibm9pc2UpIiBvcGFjaXR5PSIwLjA1Ii8+PC9zdmc+')] opacity-[0.25] mix-blend-overlay">
        </div>
    </div>

    <!-- Content -->
    <div class="relative z-10 w-full max-w-md rounded-[2.5rem] glass-panel p-10 animate-slide-up mx-4">
        <a href="welcome.html"
            class="group mb-8 flex w-fit items-center text-sm font-medium text-zinc-400 transition-colors hover:text-zinc-200">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="mr-2 transition-transform group-hover:-translate-x-1">
                <path d="m12 19-7-7 7-7" />
                <path d="M19 12H5" />
            </svg>
            Back
        </a>
        <h2 class="mb-2 text-3xl font-bold tracking-tight text-zinc-100">Welcome Back</h2>
        <p class="mb-8 text-sm text-zinc-400">Enter your details to access your workspace.</p>

        <form class="space-y-5" action="#" method="POST">
            <div class="space-y-1.5">
                <label for="email" class="text-xs font-medium text-zinc-400 ml-1">Email</label>
                <input type="email" id="email" required placeholder="name@example.com"
                    class="w-full rounded-2xl px-4 py-4 text-sm text-zinc-100 placeholder:text-zinc-600 glass-input"
                    autocomplete="email">
            </div>
            <div class="space-y-1.5">
                <label for="password" class="text-xs font-medium text-zinc-400 ml-1">Password</label>
                <input type="password" id="password" required placeholder="••••••••"
                    class="w-full rounded-2xl px-4 py-4 text-sm text-zinc-100 placeholder:text-zinc-600 glass-input"
                    autocomplete="current-password">
            </div>
            <button type="submit"
                class="mt-4 w-full rounded-2xl bg-zinc-100 px-4 py-4 text-sm font-semibold text-zinc-900 shadow-lg shadow-white/5 transition-all hover:bg-white active:scale-[0.98]">Sign
                In</button>
            <div class="pt-4 text-center">
                <p class="text-sm text-zinc-400">Don't have an account? <a href="register.html"
                        class="font-medium text-zinc-200 underline decoration-purple-500/50 underline-offset-4 hover:text-white transition-colors">Sign
                        up</a></p>
            </div>
        </form>
    </div>

    <script src="auth.js"></script>
</body>

</html>
